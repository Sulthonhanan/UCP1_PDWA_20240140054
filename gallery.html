<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        :root {
            --primary-brown: #8B4513;   
            --secondary-tan: #D2B48C;  
            --bg-soft: #FAF8F5;       
            --text-dark: #4A4A4A;
        }

        body {
            background-color: var(--bg-soft);
            color: var(--text-dark);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        header {
            background-color: #ffffff;
            border-bottom: 2px solid var(--secondary-tan);
            padding: 15px 0;
        }

        .logo {
            font-weight: bold;
            font-size: 1.5rem;
            color: var(--primary-brown);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            gap: 20px;
        }

        nav ul li a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 500;
            transition: 0.3s;
        }

        nav ul li a:hover {
            color: var(--primary-brown);
        }

        .table-custom {
            background-color: #ffffff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .gallery-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-top: 30px;
        }

        .media-box {
            border: 1px solid #eee;
            padding: 15px;
            border-radius: 10px;
            height: 100%;
            background: #fff;
        }

        .btn-custom {
            background-color: var(--primary-brown);
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 5px;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background-color: #5D2E0A;
            color: white;
        }
    </style>
</head>

<body>
    <div class="container d-flex justify-content-between align-items-center">
        <div class="fw-bold text-uppercase" style="color: var(--primary-brown);">Tech Community</div>
        <nav>
            <a href="index.html" class="text-decoration-none me-3 text-dark">Home</a>
            <a href="form.html" class="text-decoration-none me-3 text-dark">Form</a>
            <a href="gallery.html" class="text-bold text-decoration-none" style="color: var(--primary-brown);">Gallery</a>
        </nav>
    </div>
    <main class="container">
        <div class="gallery-container">
            <h1 class="text-center mb-4" style="color:  var(--primary-brown);">Multimedia Gallery</h1>

            <div class="row g-4">
                <div class="col-md-4">
                    <div class="media-box text-center">
                        <p class="fw-bold">Gambar</p>
                        <img src="cyber.png" alt="Cyber Security" class="img-fluid rounder mb-3" style="max-height: 200px;">
                        <br>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="media-box text-center">
                    <p class="fw-bold">Video Edukasi</p>
                    <div class="ratio ratio-16x9">
                         <iframe src="video.mp4" frameborder="0" allowfullscreen class="img-fluid rounder mb-3" style="max-height: 200px;"></iframe>
                    </div>
                </div>
            </div>
    </main>
    <iframe src="" frameborder="1">ini video</iframe>
    <audio src=""></audio>
    <a href="./index.html"></a>
</body>

</html>
