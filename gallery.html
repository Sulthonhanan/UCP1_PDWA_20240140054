<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        :root {
            --primary-brown: #8B4513;   
            --secondary-tan: #D2B48C;  
            --bg-soft: #FAF8F5;       
            --text-dark: #4A4A4A;
        }

        body {
            background-color: var(--bg-soft);
            color: var(--text-dark);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        header {
            background-color: #ffffff;
            border-bottom: 2px solid var(--secondary-tan);
            padding: 15px 0;
        }

        .logo {
            font-weight: bold;
            font-size: 1.5rem;
            color: var(--primary-brown);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            gap: 20px;
        }

        nav ul li a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 500;
            transition: 0.3s;
        }

        nav ul li a:hover {
            color: var(--primary-brown);
        }

        .table-custom {
            background-color: #ffffff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
    </style>
</head>

<body>
    <h1 style="text-align: center;">Gallery</h1>
    <p>Gambar</p>
    <img src="kicaw.png" alt="gambar screeshoot">
    <iframe src="" frameborder="1">ini video</iframe>
    <audio src=""></audio>
    <a href="./index.html"></a>
</body>

</html>
