<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --primary-brown: #8B4513;
            --secondary-tan: #D2B48C;
            --bg-soft: #FAF8F5;
        }

        body {
            background-color: var(--bg-soft);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        header {
            background-color: #ffffff;
            border-bottom: 2px solid var(--secondary-tan);
            padding: 15px 0;
        }

        .form-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-top: 50px;
        }

        .btn-custom {
            background-color: var(--primary-brown);
            color: white;
            border: none;
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background-color: #5D2E0A;
            color: white;
        }
    </style>
</head>

<body>
    <header>
        <div class="container d-flex justify-content-between align-items-center">
            <div class="fw-bold text-uppercase" style="color: var(--primary-brown);">Tech Community</div>
            <nav>
                <a href="index.html" class="text-decoration-none me-3 text-dark">Home</a>
                <a href="gallery.html" class="text-decoration-none text-dark">Gallery</a>
            </nav>
        </div>
    </header>
    <h1 style="text-align: center;">Silahkan isi identitas anda disini</h1>
    <input type="text" name="name" id="nama">
    <input type="text" name="email" id="email">

    <form action="form.html"></form>
    <button type="submit" ; style="text-align: left; height: 27px; width: 25px; "></button>

</html>
